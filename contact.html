<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact — Pallas Engineering</title>
    <meta name="description" content="Contacteer Pallas Engineering via ons contactformulier." />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="./assets/css/styles.css" rel="stylesheet" />

  </head>

  <body>
      <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
          <div class="container">
              <a href="./index.html">
                  <img src="./assets/pictures/Pallas.png" alt="Pallas Engineering logo" width="40" class="me-2" />
              </a>
              <a class="navbar-brand fw-semibold" href="./index.html">Pallas Engineering</a>

              <button class="navbar-toggler"
                      type="button"
                      data-bs-toggle="collapse"
                      data-bs-target="#nav"
                      aria-controls="nav"
                      aria-expanded="false"
                      aria-label="Menu">
                  <span class="navbar-toggler-icon"></span>
              </button>

              <div class="collapse navbar-collapse" id="nav">
                  <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
                      <li class="nav-item"><a class="nav-link" href="./index.html#diensten">Diensten</a></li>
                      <li class="nav-item"><a class="nav-link" href="./index.html#over">Over</a></li>
                      <li class="nav-item">
                          <a class="nav-link active" href="./contact.html" aria-current="page">Contact</a>
                      </li>
                  </ul>
              </div>
          </div>
      </nav>

      <main class="container py-5">
          <div class="row justify-content-center">
              <div class="col-12 col-lg-8">
                  <h1 class="fw-bold mb-2">Contact</h1>
                  <p class="text-muted mb-4">
                      Vul het formulier in en wij nemen contact met u op.
                  </p>

                  <div class="card shadow-sm mb-4" >
                      <div class="card-body p-4">
                          <form action="https://formspree.io/f/mdapjddv" method="POST">

                              <div class="mb-3">
                                  <label for="name" class="form-label">Naam *</label>
                                  <input type="text"
                                         class="form-control"
                                         id="name"
                                         name="name"
                                         required />
                              </div>

                              <div class="mb-3">
                                  <label for="email" class="form-label">E-mail *</label>
                                  <input type="email"
                                         class="form-control"
                                         id="email"
                                         name="email"
                                         required />
                              </div>
                              <div class="mb-3">
                                  <label for="telefoon" class="form-label">Telefoonnummer</label>
                                  <input type="tel"
                                         class="form-control"
                                         id="telefoon"
                                         name="telefoon" />
                              </div>

                              <div class="mb-3">
                                  <label for="bedrijf" class="form-label">Bedrijf</label>
                                  <input type="text"
                                         class="form-control"
                                         id="bedrijf"
                                         name="bedrijf" />
                              </div>

                              <div class="mb-3">
                                  <label for="onderwerp" class="form-label">Onderwerp *</label>
                                  <input type="text"
                                         class="form-control"
                                         id="onderwerp"
                                         name="onderwerp"
                                         required />
                              </div>

                              <div class="mb-3">
                                  <label for="bericht" class="form-label">Bericht *</label>
                                  <textarea class="form-control"
                                            id="bericht"
                                            name="message"
                                            rows="5"
                                            required></textarea>
                              </div>

                              <p class="text-muted small mb-3">
                                  * Verplichte velden
                              </p>

                              <div class="d-grid gap-2 d-sm-flex">
                                  <button type="submit" class="btn btn-primary btn-lg">Verzenden</button>
                                  <a class="btn btn-outline-secondary btn-lg" href="./index.html">Annuleren</a>
                              </div>
                          </form>
                      </div>
                  </div>

                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h3 class="fw-bold mb-3">Pallas Engineering</h3>
                        <p class="d-flex align-items-center mb-1"><i class="bi bi-telephone me-4"></i><span> <a href="tel:+32479588397">+32 479 58 83 97</a></span></p>
                        <p class="d-flex align-items-center mb-1"><i class="bi bi-envelope me-4"></i><span><a href="mailto:bollen.yannick@gmail.com">bollen.yannick@gmail.com</a></span></p>
                        <p class="d-flex align-items-center mb-0"><i class="bi bi-building me-4"></i><span>BE0755 730 760</span></p>
                    </div>
                </div>
      </main>

      <footer class="border-top">
          <div class="container py-4 d-flex flex-column flex-md-row gap-2 justify-content-between align-items-center">
              <div class="text-muted small">© <span id="year"></span> Pallas Engineering</div>
              <div class="text-muted small d-flex gap-3">
                  <a class="link-secondary text-decoration-none" href="./index.html">Home</a>
                  <a>|</a>
                  <a class="link-secondary text-decoration-none" href="https://www.linkedin.com/company/pallasengineering" target="_blank" rel="noopener noreferrer" style="color: #0077B5;">
                      <i class="bi bi-linkedin"></i> LinkedIn
                  </a>
              </div>
          </div>
      </footer>

      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
      <script>
          document.getElementById("year").textContent = new Date().getFullYear();
      </script>
  </body>
</html>
